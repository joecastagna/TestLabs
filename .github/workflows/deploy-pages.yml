name: Deploy to GitHub Pages

# Publishes the repo to GitHub Pages on every push to main (except when only the
# live standings snapshot changes — the app fetches that directly, so it doesn't
# need a redeploy). Enables Pages automatically on first run.
on:
  push:
    branches: [main]
    paths-ignore:
      - "FIFA/live-data.json"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
